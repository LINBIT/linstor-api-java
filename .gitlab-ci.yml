image: openjdk:11-ea-9

variables:
  LINSTOR_CONTROLLER_HOST: 'linstor-controller'
  LINSTOR_CONTROLLER_PORT: '3370'

services:
  - name: $CI_REGISTRY/linstor/linstor-server/controller
    alias: linstor-controller

cache:
  paths:
    - .gradle/wrapper
    - .gradle/caches

build:
  stage: build
  script:
    - ./gradlew assemble

test:
  stage: test
  script:
    - |
      curl -X POST -H "Content-Type: application/json" -d '{"resource_definition": {"name": "rsc-restart"}}' http://linstor-controller:3370/v1/resource-definitions
      curl -X POST -H "Content-Type: application/json" -d '{"volume_definition": {"size_kib": 104857600, "flags": []}, "drbd_minor_number": 1002}' http://linstor-controller:3370/v1/resource-definitions/rsc-restart/volume-definitions
    - JAVA_OPTS="-ea" ./gradlew test
  artifacts:
    reports:
      junit: build/test-results/test/TEST-*.xml

test-token-auth:
  stage: test
  script:
    - |
      curl -X POST -H "Content-Type: application/json" -d '{"resource_definition": {"name": "rsc-restart"}}' http://linstor-controller:3370/v1/resource-definitions
      curl -X POST -H "Content-Type: application/json" -d '{"volume_definition": {"size_kib": 104857600, "flags": []}, "drbd_minor_number": 1002}' http://linstor-controller:3370/v1/resource-definitions/rsc-restart/volume-definitions
    - |
      # Initialize token auth (this also enables HTTPS on the controller) and capture the
      # returned init token. It is delivered in the ApiCallRcList entry's obj_refs.token field.
      TOKEN="$(curl -fsS -X POST -H "Content-Type: application/json" \
        -d '{"description": "gitlab-ci"}' \
        "http://linstor-controller:3370/v1/controller/auth/initialize-token-auth" \
        | sed -nE 's/.*"token"[[:space:]]*:[[:space:]]*"([^"]+)".*/\1/p' | head -n1)"
      if [ -z "$TOKEN" ]; then echo "ERROR: failed to initialize token auth"; exit 1; fi
      export LINSTOR_API_TOKEN="$TOKEN"
      echo "Token auth initialized (token length: ${#TOKEN})"
    - JAVA_OPTS="-ea" ./gradlew test
  artifacts:
    reports:
      junit: build/test-results/test/TEST-*.xml
